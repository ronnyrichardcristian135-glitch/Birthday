<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Untuk Maharani ❤️</title>

<style>
body {
  margin: 0;
  background: #d8cfc4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
}

/* Container buku */
.book {
  position: relative;
  width: 300px;
  height: 420px;
}

/* Halaman */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffaf0;
  border-radius: 8px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  transform-origin: left;
  transition: transform 1s;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
  backface-visibility: hidden;
}

/* Halaman belakang */
.page.back {
  transform: rotateY(180deg);
}

/* Flip */
.page.flipped {
  transform: rotateY(-180deg);
}

/* Tombol */
button {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border: none;
  background: #8b5e3c;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="book" id="book">

  <div class="page" id="p1">Untuk Maharani 💖</div>
  <div class="page" id="p2">Hari ini kamu genap 23 tahun 🎂</div>
  <div class="page" id="p3">Terima kasih sudah hadir di hidup aku</div>
  <div class="page" id="p4">Kamu sederhana... tapi berarti</div>
  <div class="page" id="p5">Semoga kamu selalu bahagia</div>
  <div class="page" id="p6">Dan aku tetap ada di cerita kamu ❤️</div>

  <button onclick="flipPage()">Balik Halaman ➡</button>

</div>

<script>
let currentPage = 1;
const total = 6;

function flipPage() {
  if (currentPage <= total) {
    document.getElementById("p" + currentPage).classList.add("flipped");
    currentPage++;
  }
}
</script>

</body>
</html>
